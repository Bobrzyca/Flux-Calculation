name: test

# Runs the existing test suites + security scanning on every push and PR.
on:
  push:
    branches: [main, flux-improvements]
  pull_request:
  workflow_dispatch:

# Least privilege: jobs only read the repo (satisfies checkov CKV2_GHA_1).
permissions:
  contents: read

jobs:
  backend:
    name: backend (pytest + ruff + mypy)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
      - name: Install (runtime + dev)
        run: pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check .
      - name: Format check (ruff)
        run: ruff format --check .
      - name: Type check (mypy)
        run: mypy .
      - name: Tests (pytest)
        run: pytest

  frontend:
    name: frontend (vitest + lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci
      - name: Lint (oxlint)
        run: npm run lint
      - name: Format check (prettier)
        run: npm run format:check
      - name: Type check (tsc)
        run: npm run typecheck
      - name: Unit tests (vitest)
        run: npm test
      - name: Build
        run: npm run build

  e2e:
    name: frontend e2e (playwright)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: Run e2e (builds + previews the app, then runs the smoke suite)
        run: npm run test:e2e
      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

  checkov:
    name: security scan (checkov)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Install checkov
        run: pip install "checkov>=3,<4"
      - name: Scan (Dockerfiles, workflows, secrets)
        run: checkov --config-file infrastructure/checkov/.checkov.yaml

  audit:
    name: dependency vulnerability audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      # Backend: fail on any known-vulnerable Python dependency.
      # NOTE: no --strict. Installing the backend editable (`-e ./backend`) puts our
      # own package `flux-calculation-backend` in the environment; it isn't on PyPI,
      # so pip-audit always SKIPS it — and --strict turns any skip into a failure,
      # which would fail this job on every run regardless of vulnerabilities. Without
      # --strict, pip-audit still exits non-zero when it finds a real advisory in any
      # third-party dependency (which is what we actually want to gate on).
      - name: pip-audit (backend)
        run: |
          pip install pip-audit
          pip install -e ./backend
          pip-audit --desc
      # Frontend: fail on high/critical advisories in production deps.
      - name: npm audit (frontend)
        working-directory: frontend
        run: |
          npm ci
          npm audit --omit=dev --audit-level=high

  docker-build:
    name: docker build + image scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      # Build both production images (proves the Dockerfiles build in CI).
      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          load: true
          tags: flux-backend:ci
      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          load: true
          tags: flux-frontend:ci
          build-args: |
            VITE_SENTRY_RELEASE=${{ github.sha }}
            VITE_SENTRY_ENVIRONMENT=production
      # Image scan. Report-only for now (exit-code 0) so a stale base image can't
      # block every deploy; it surfaces fixable High/Critical CVEs in the log.
      # After rebuilding the frontend base (`docker compose build --pull`, SEC-04),
      # flip exit-code to "1" to make fixable High/Critical block the pipeline.
      - name: Trivy scan (backend)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: flux-backend:ci
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "0"
      - name: Trivy scan (frontend)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: flux-frontend:ci
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "0"

  docs:
    name: docs (openapi generation + validation + markdownlint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: package-lock.json
      # Backend must be importable so the OpenAPI schema can be generated from it.
      - name: Install backend (for OpenAPI generation)
        run: pip install -e ./backend
      - name: Install docs tooling (redocly + markdownlint)
        run: npm ci
      # Regenerate the spec and fail if the committed docs/openapi.json is stale —
      # this keeps the published API spec honest with the code.
      - name: Generate OpenAPI spec
        run: npm run docs:generate
      - name: Fail if docs/openapi.json is out of date
        run: |
          if ! git diff --quiet -- docs/openapi.json; then
            echo "::error::docs/openapi.json is out of date. Run 'npm run docs:generate' and commit the result."
            git --no-pager diff -- docs/openapi.json
            exit 1
          fi
      - name: Validate OpenAPI spec (redocly)
        run: npm run docs:validate
      - name: Lint Markdown (markdownlint)
        run: npm run docs:lint
