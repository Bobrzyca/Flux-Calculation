# Production Docker setup for Flux Calculation.
#
#   internet ──▶ traefik (80/443, HTTPS) ──▶ frontend (nginx, React bundle)
#                       └────────────────▶ backend  (FastAPI, /api)
#
# Traefik is the only service published to the host (ports 80 + 443). It
# terminates TLS (Let's Encrypt) and routes by hostname/path to the app
# containers, which are reachable *only* through it on the shared `flux-net`
# bridge network:
#   - Host(kulis.aibr.cz)                    -> frontend  (static bundle + SPA)
#   - Host(kulis.aibr.cz) && PathPrefix(/api) -> backend   (FastAPI, higher prio)
#
# The backend mounts all routes under `/api`, so Traefik forwards the prefix
# unchanged (no strip middleware). nginx's own /api proxy stays in place as a
# harmless fallback for non-Traefik runs; in production Traefik matches /api
# first and reaches the backend directly.
#
# Config comes from a project-root .env file (copy .env.example -> .env).
# Nothing here is started automatically — run `docker compose up -d --build`.
#
# Logging: every service uses the json-file driver with rotation (10 MB × 3
# files ≈ 30 MB max per container) so container logs can't fill the 75 GB disk.
# The app itself logs structured JSON to stdout (LOG_FORMAT=json), which Docker
# captures; inspect with `docker compose logs -f <service>` or ship the files at
# /var/lib/docker/containers/*/*-json.log. Applying a change to this block needs
# a container recreate (`docker compose up -d`) — it does not affect a live one.

# Shared log-rotation policy, referenced by each service below via `*default-logging`.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  traefik:
    image: traefik:v3.5
    restart: always
    logging: *default-logging
    command:
      # --- Providers ---------------------------------------------------------
      # We use the file provider (./traefik/dynamic.yml), NOT the Docker
      # provider. Docker Engine 29.x requires client API >= 1.40, but Traefik's
      # Docker provider pins its client to API 1.24 and never negotiates up, so
      # the daemon rejects every call ("client version 1.24 is too old") and no
      # routers get discovered. The file provider needs no Docker socket and so
      # avoids the mismatch. `watch=true` picks up edits without a restart.
      - "--providers.file.directory=/etc/traefik/dynamic"
      - "--providers.file.watch=true"
      # --- Entry points ------------------------------------------------------
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      # Redirect all plain HTTP (web) to HTTPS (websecure). The ACME HTTP
      # challenge is still answered on :80 — Traefik handles it before the
      # redirect, so certificate issuance/renewal keeps working.
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      # --- Let's Encrypt (ACME HTTP-01 challenge) ----------------------------
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
    ports:
      # The only host-published ports in the whole stack.
      - "80:80"
      - "443:443"
    volumes:
      # Dynamic routing config (routers + services), read-only.
      - ./traefik/dynamic.yml:/etc/traefik/dynamic/dynamic.yml:ro
      # Persist issued certificates across restarts (acme.json).
      - letsencrypt:/letsencrypt
    networks:
      - flux-net

  backend:
    build:
      context: ./backend
    restart: always
    logging: *default-logging
    # The backend reads most of its settings (APP_NAME, DATA_DIR, DATABASE_URL,
    # CORS_ORIGINS, LLM_API_KEY, SENTRY_DSN, SENTRY_ENVIRONMENT,
    # SENTRY_TRACES_SAMPLE_RATE) from the project .env via pydantic-settings.
    env_file:
      - .env
    environment:
      # Release = the git commit SHA, supplied at deploy time so it always
      # matches the running code:  export SENTRY_RELEASE=$(git rev-parse HEAD)
      # This overrides any stale value in .env. Empty is fine (monitoring still
      # works, just without a release tag).
      SENTRY_RELEASE: ${SENTRY_RELEASE:-}
    volumes:
      # Persist uploaded files + the SQLite DB across container rebuilds.
      - backend-data:/app/data
    networks:
      - flux-net
    # Internal only — reached through Traefik on the /api route; not published.
    # Routing (Host + /api prefix, priority 100) is defined in traefik/dynamic.yml,
    # which addresses this service as http://backend:8000 over flux-net.
    expose:
      - "8000"

  frontend:
    build:
      context: ./frontend
      args:
        # Baked into the bundle at build time. Default "/api" is relative, so
        # the browser hits kulis.aibr.cz/api, which Traefik routes to backend.
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
        # Sentry (browser). The DSN is NOT secret — it ships in the bundle. All
        # are baked at build time (Vite inlines VITE_* at build). Monitoring is
        # off if VITE_SENTRY_DSN is empty.
        VITE_SENTRY_DSN: ${VITE_SENTRY_DSN:-}
        VITE_SENTRY_ENVIRONMENT: ${VITE_SENTRY_ENVIRONMENT:-production}
        VITE_SENTRY_RELEASE: ${SENTRY_RELEASE:-}
        VITE_SENTRY_TRACES_SAMPLE_RATE: ${VITE_SENTRY_TRACES_SAMPLE_RATE:-0}
        # Source-map upload creds (SECRET auth token). Only used during build;
        # when SENTRY_AUTH_TOKEN is empty, no maps are emitted or uploaded.
        # NOTE: passed as a build arg it lands in image history — see report.md
        # "residual risks" for the mitigation.
        SENTRY_AUTH_TOKEN: ${SENTRY_AUTH_TOKEN:-}
        SENTRY_ORG: ${SENTRY_ORG:-}
        SENTRY_PROJECT: ${SENTRY_PROJECT:-}
    restart: always
    logging: *default-logging
    depends_on:
      - backend
    # No host port mapping — reachable only through Traefik.
    # Routing (Host catch-all) is defined in traefik/dynamic.yml, which
    # addresses this service as http://frontend:80 over flux-net.
    networks:
      - flux-net

networks:
  flux-net:
    driver: bridge

volumes:
  backend-data:
  letsencrypt:
