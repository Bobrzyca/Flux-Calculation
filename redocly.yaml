# Redocly config for `npm run docs:validate` (validates docs/openapi.json).
#
# The spec is GENERATED by FastAPI and is valid OpenAPI 3.1. We use the `minimal`
# ruleset (structural validity + a few sane checks) and turn OFF the opinionated
# authoring rules that don't apply to this app, each with a reason:
extends:
  - minimal

rules:
  # This is a LOCAL, SINGLE-USER tool with no authentication by design (see
  # docs/architecture.md → trust boundaries). There is intentionally no security
  # scheme, so "every operation must declare security" does not apply.
  security-defined: off
  # Not a distributed/published package — no license field is expected.
  info-license: off
  # Nice-to-have, not a validity issue for a generated spec.
  operation-4xx-response: warn
