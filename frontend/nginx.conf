# nginx config for the production frontend container.
#
# Two jobs:
#   1. Serve the static React bundle with SPA fallback (client-side routing).
#   2. Reverse-proxy /api to the backend container over the shared Docker
#      network (resolved by the compose service name "backend"). This keeps
#      the browser same-origin, so no CORS is needed in production.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # LI-7810 concentration logs can be large; allow generous uploads.
    client_max_body_size 100M;

    # Backend API — everything under /api goes to the FastAPI service.
    # "backend" is the compose service name; 8000 is its internal port.
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # Static assets + SPA fallback: unknown paths return index.html so the
    # react-router routes (Upload, Confirm, Results, ...) resolve client-side.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
